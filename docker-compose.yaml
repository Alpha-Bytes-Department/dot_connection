services:

  redis:
    image: redis:7-alpine
    container_name: dot_connection_app_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s

  backend:
    container_name: dot_connection_app_backend
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    network_mode: host
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - dot_connection_app_logs:/app/winston
    restart: unless-stopped

volumes:
  dot_connection_app_logs: